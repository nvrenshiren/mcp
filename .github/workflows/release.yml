name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for pending changesets
        id: changesets
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          pending=0
          for f in "${files[@]}"; do
            case "$(basename "$f")" in
              README.md) ;;
              *) pending=1 ;;
            esac
          done
          echo "pending=$pending" >> "$GITHUB_OUTPUT"
          if [ "$pending" -eq 1 ]; then
            echo "Found pending changesets — will version & publish."
          else
            echo "No pending changesets — nothing to release."
          fi

      - name: Version packages
        if: steps.changesets.outputs.pending == '1'
        run: pnpm run version-packages

      - name: Commit version bump
        if: steps.changesets.outputs.pending == '1'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git add .
            git commit -m "chore(release): version packages [skip ci]"
            git push origin HEAD:master
          fi

      - name: Build
        if: steps.changesets.outputs.pending == '1'
        run: pnpm build

      - name: Publish to npm
        if: steps.changesets.outputs.pending == '1'
        run: pnpm changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
