name: 🐛 Bug Report
description: 报告一个 bug
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢花时间反馈!请尽量填全下面的字段,方便复现。

  - type: dropdown
    id: package
    attributes:
      label: 涉及哪个服务
      options:
        - "@dawipong/mcp-hello"
        - 其它 / 不确定
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 服务版本
      description: 比如 `@dawipong/mcp-hello@0.1.0`,或 `npm ls` 的输出
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: MCP 客户端
      description: Claude Desktop / Cursor / Cline / 其它,带版本号
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: 运行环境
      description: 操作系统 + Node 版本,例如 `macOS 14.5 / Node 20.18.0`
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      placeholder: |
        1. 在 Claude Desktop 配置里加 ...
        2. 让 AI 调用 xxx 工具
        3. 看到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为 / 错误日志
      render: shell
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息 (可选)
