name: ✨ Feature Request
description: 提议新功能 / 新服务
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        想到一个新服务或新工具?来说说。新服务建议先开 Discussion 讨论可行性。

  - type: dropdown
    id: kind
    attributes:
      label: 类型
      options:
        - 新增 MCP 服务
        - 已有服务加新工具
        - 已有服务改进 (性能 / DX 等)
        - 仓库基建 (CI / 文档 / 模板)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 用户 / AI 现在卡在哪里?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的方案
      description: 描述输入、输出、调用方式。如果是新服务,顺便建议包名 (`dawi-mcp-xxx`)。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 (可选)

  - type: textarea
    id: extra
    attributes:
      label: 补充信息 (可选)
